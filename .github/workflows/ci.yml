name: Smart Campus Hub - Build and Test CI
on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main" ]
jobs:
  # Backend: Spring Boot build + test
  backend:
    name: Backend - Maven Build and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw
      - name: Build and run tests (H2 in-memory, no MySQL needed)
        run: ./mvnw --no-transfer-progress clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          APP_JWT_SECRET: CITestSecretKeyForSmartCampusHub256BitsLongEnough!!
          APP_JWT_EXPIRATION_MS: 86400000
          APP_UPLOAD_DIR: /tmp/uploads/tickets
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: target/surefire-reports/
  # Frontend: React install + build
  frontend:
    name: Frontend - React Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build React application
        run: npm run build
        env:
          CI: false
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build/
