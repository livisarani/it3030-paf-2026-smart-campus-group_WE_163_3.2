spring.application.name=Smart_Campus_Operations_Hub

# ============================================================
# Database ? H2 (file-persisted; swap for MySQL in production)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/smartcampus;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# MySQL (uncomment for production)
# ============================================================
# spring.datasource.url=jdbc:mysql://localhost:3307/smart_campus?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=123456
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# JWT
# ============================================================
app.jwt.secret=SmartCampusHubSuperSecretKeyForJWT2026MustBe256BitsOrMore!!
app.jwt.expiration-ms=86400000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads/tickets

# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# App
# ============================================================
app.base-url=http://localhost:3000

